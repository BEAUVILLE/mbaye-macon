name: Intégrer la carte Mbaye

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/integrate-mbaye-card.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Intégrer une seule carte officielle
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          old_image = '<img alt="Mbaye Diouf — entrepreneur maçon, villas et piscines à Saly" id="posterImg" loading="eager" src="https://digiylyfe.net/wp-content/uploads/2026/05/ChatGPT-Image-14-mai-2026-03_56_26.png"/>'
          new_image = '''<a href="https://mbaye-macon.digiylyfe.com/" id="businessCardLink" target="_blank" rel="noopener" aria-label="Ouvrir la fiche officielle de Mbaye Diouf" style="display:block;width:100%;cursor:pointer">
          <img alt="Carte de visite officielle de Mbaye Diouf — entrepreneur maçon" id="posterImg" loading="eager" src="./carte-visite.png?v=20260714" style="width:100%;max-height:760px;object-fit:contain;display:block;padding:10px"/>
          </a>'''

          if old_image not in text:
              raise SystemExit("Image principale actuelle introuvable")

          text = text.replace(old_image, new_image, 1)
          text = text.replace(
              'content="mbaye-diouf-fr-en-20260620" name="digiy-build"',
              'content="mbaye-carte-officielle-20260714" name="digiy-build"',
              1,
          )
          text = text.replace(
              'content="https://digiylyfe.net/wp-content/uploads/2026/05/ChatGPT-Image-14-mai-2026-03_56_26.png" property="og:image"',
              'content="https://mbaye-macon.digiylyfe.com/carte-visite.png?v=20260714" property="og:image"',
              1,
          )
          text = text.replace(
              '"image": "https://digiylyfe.net/wp-content/uploads/2026/05/ChatGPT-Image-14-mai-2026-03_56_26.png"',
              '"image": "https://mbaye-macon.digiylyfe.com/carte-visite.png?v=20260714"',
              1,
          )

          if text.count('id="businessCardLink"') != 1:
              raise SystemExit("Le lien carte doit apparaître exactement une fois")
          if text.count('src="./carte-visite.png?v=20260714"') != 1:
              raise SystemExit("La carte doit apparaître exactement une fois")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Publier
        shell: bash
        run: |
          grep -q 'id="businessCardLink"' index.html
          grep -q 'src="./carte-visite.png?v=20260714"' index.html
          grep -q 'href="https://mbaye-macon.digiylyfe.com/"' index.html

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/integrate-mbaye-card.yml
          git add index.html
          git commit -m "Afficher la carte officielle cliquable de Mbaye"
          git push
